{{ define "main" }}
  <article style="max-width: 1050px; margin: 0 auto; padding: 2.5rem 2rem 4rem;">
    <header>
      <h1 style="margin-top: 0.5rem; margin-bottom: 1.5rem; font-size: 2.4rem; font-weight: 800;" class="text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
    </header>
    <section class="prose prose-xl dark:prose-invert" style="max-width: none; font-size: 1.15rem;">
      {{ .Content }}
    </section>
  </article>
{{ end }}
